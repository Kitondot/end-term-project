version: '3.8'

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/authdb
      SECRET_KEY: mysecretkey123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/productdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/orderdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 10s

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/userdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/paymentdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/notificationdb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - product-service
    networks:
      - app-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    networks:
      - app-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - app-net
    restart: on-failure

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - app-net